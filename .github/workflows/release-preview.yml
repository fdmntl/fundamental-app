name: Preview Release Notes

on:
  push:
    branches:
      - main
      - 311-auto-increment-the-version-on-release

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Semantic release dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "--- DRY RUN ---" >> release-preview.txt
          npx semantic-release --dry-run --no-ci >> release-preview.txt || true
          cat release-preview.txt

      - name: Upload changelog preview
        uses: actions/upload-artifact@v4
        with:
          name: release-preview
          path: release-preview.txt
