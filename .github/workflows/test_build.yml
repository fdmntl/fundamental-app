name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - dev
      - try-build
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: cd android && ./gradlew clean && ./gradlew assembleRelease
      - name: Confirm build
        run: |
          echo "Build completed successfully!"
          echo "You can download the build from the EAS dashboard."
